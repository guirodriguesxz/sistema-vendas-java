<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Cadastro de Fornecedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/administrativo}">Sistema de Vendas</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm border-0 col-md-8 mx-auto">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Cadastro de Fornecedor</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/salvarFornecedor}" th:object="${fornecedor}" method="POST">

                <div class="mb-3">
                    <label class="form-label fw-bold">ID</label>
                    <input type="text" th:field="*{id}" class="form-control bg-light" readonly placeholder="Automático">
                </div>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold">Razão Social / Nome</label>
                        <input type="text" th:field="*{nome}" class="form-control" placeholder="Digite o nome" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">CNPJ</label>
                        <input type="text" th:field="*{cnpj}" id="cnpj" class="form-control" placeholder="00.000.000/0000-00" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Cidade</label>
                    <select th:field="*{cidade}" class="form-select" required>
                        <option value="" disabled selected>Selecione uma cidade...</option>
                        <option th:each="cid : ${listaCidades}" th:value="${cid.id}" th:text="${cid.nome}"></option>
                    </select>
                </div>

                <div class="mt-4 border-top pt-3">
                    <button type="submit" class="btn btn-primary px-4 shadow-sm">Salvar Fornecedor</button>
                    <a th:href="@{/listaFornecedor}" class="btn btn-secondary px-4 ms-2 shadow-sm">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<script>
    $(document).ready(function(){
        // CORREÇÃO: Máscara específica para CNPJ e ID correto
        $('#cnpj').mask('00.000.000/0000-00');
    });
</script>

</body>
</html>
