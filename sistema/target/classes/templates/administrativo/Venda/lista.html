<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Listar Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/administrativo}">Sistema de Vendas</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold"><i class="fa-solid fa-file-invoice-dollar me-2 text-success"></i>Vendas Realizadas</h4>
            <a th:href="@{/cadastroVenda}" class="btn btn-success shadow-sm"><i class="fas fa-plus me-1"></i> Nova Venda</a>
        </div>

        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Cliente</th>
                <th>Vendedor</th>
                <th class="text-center">Itens</th>
                <th>Total</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${listaVendas}">
                <td th:text="${v.id}" class="fw-bold"></td>
                <td th:text="${#dates.format(v.dataVenda, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${v.cliente.nome}"></td>
                <td th:text="${v.funcionario.nome}"></td>
                <td th:text="${v.quantidadeTotal}" class="text-center"></td>
                <td th:text="${#numbers.formatCurrency(v.valorTotal)}" class="fw-bold text-primary"></td>
                <td class="text-center">
                    <a th:href="@{/editarVenda/{id}(id=${v.id})}" class="text-warning me-2" title="Ver/Editar">
                        <i class="fa-solid fa-eye fa-lg"></i>
                    </a>
                    <a th:href="@{/removerVenda/{id}(id=${v.id})}" class="text-danger" title="Estornar Venda"
                       onclick="return confirm('Deseja estornar esta venda? O estoque será devolvido.')">
                        <i class="fa-solid fa-trash fa-lg"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="mt-4">
            <a th:href="@{/administrativo}" class="btn btn-outline-dark">Voltar ao Painel</a>
        </div>
    </div>
</div>

</body>
</html>
