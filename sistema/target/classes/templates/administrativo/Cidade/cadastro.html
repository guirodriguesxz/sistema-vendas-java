<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Cadastro de Cidade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<div class="container mt-5">
    <div class="card shadow-sm border-0 col-md-6 mx-auto">
        <div class="card-header bg-dark text-white"><h4>Cadastro de Cidade</h4></div>
        <div class="card-body">
            <form th:action="@{/salvarCidade}" th:object="${cidade}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">ID</label>
                    <input type="text" th:field="*{id}" class="form-control bg-light" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome da Cidade</label>
                    <input type="text" th:field="*{nome}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Estado</label>
                    <select th:field="*{estado}" class="form-select" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option th:each="est : ${listaEstados}" th:value="${est.id}" th:text="${est.nome}"></option>
                    </select>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary px-4">Salvar</button>
                    <a th:href="@{/listaCidade}" class="btn btn-secondary px-4 ms-2">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
