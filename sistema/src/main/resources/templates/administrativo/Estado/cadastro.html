<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Cadastro de Estado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Cadastro de Estado</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/salvarEstado}" th:object="${estado}" method="POST">

                        <div class="mb-3">
                            <label class="form-label fw-bold">ID</label>
                            <input type="text" th:field="*{id}" class="form-control bg-light" readonly placeholder="Automático">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Estado</label>
                            <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: São Paulo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Sigla</label>
                            <input type="text" th:field="*{sigla}" class="form-control" placeholder="Ex: SP" maxlength="2" required>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary px-4">Salvar Estado</button>
                            <a th:href="@{/listaEstado}" class="btn btn-secondary px-4 ms-2">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
