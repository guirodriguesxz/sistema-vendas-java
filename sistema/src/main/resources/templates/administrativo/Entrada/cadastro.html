<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Entrada de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0"><i class="fa-solid fa-truck-ramp-box me-2"></i>Nova Entrada de Estoque</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/salvarEntrada}" th:object="${entrada}" method="POST">

                <input type="hidden" th:field="*{id}">

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Fornecedor</label>
                        <select th:field="*{fornecedor}" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option th:each="forn : ${listaFornecedores}" th:value="${forn.id}" th:text="${forn.nome}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Responsável (Funcionário)</label>
                        <select th:field="*{funcionario}" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option th:each="func : ${listaFuncionarios}" th:value="${func.id}" th:text="${func.nome}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Observação</label>
                        <input type="text" th:field="*{obs}" class="form-control" placeholder="Ex: NF 12345">
                    </div>
                </div>

                <hr>

                <div class="bg-white p-3 border rounded mb-4 shadow-sm" th:object="${itemEntrada}">
                    <h5 class="mb-3 text-secondary border-bottom pb-2">Adicionar Produto</h5>
                    <div class="row align-items-end">
                        <div class="col-md-5">
                            <label class="form-label fw-bold small">Produto</label>
                            <select th:field="*{produto}" class="form-select">
                                <option value="">Selecione o produto...</option>
                                <option th:each="prod : ${listaProdutos}" th:value="${prod.id}" th:text="${prod.nome}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-bold small">Quantidade</label>
                            <input type="number" step="0.01" th:field="*{quantidade}" class="form-control" placeholder="0.00">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-bold small">Valor Custo (un)</label>
                            <input type="number" step="0.01" th:field="*{valor}" class="form-control" placeholder="R$ 0.00">
                        </div>
                        <div class="col-md-3">
                            <button type="submit" name="acao" value="itens" class="btn btn-info w-100 text-white fw-bold">
                                <i class="fa-solid fa-plus me-1"></i> Adicionar Item
                            </button>
                        </div>
                    </div>
                </div>

                <h5 class="mb-3"><i class="fa-solid fa-list-ul me-2"></i>Produtos da Entrada</h5>
                <div class="table-responsive">
                    <table class="table table-hover border">
                        <thead class="table-light">
                        <tr>
                            <th>Produto</th>
                            <th class="text-center">Quantidade</th>
                            <th>Valor Unit.</th>
                            <th>Subtotal</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="it : ${listaItemEntradas}">
                            <td th:text="${it.produto.nome}"></td>
                            <td th:text="${it.quantidade}" class="text-center"></td>
                            <td th:text="${#numbers.formatCurrency(it.valor)}"></td>
                            <td th:text="${#numbers.formatCurrency(it.quantidade * it.valor)}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listaItemEntradas)}">
                            <td colspan="4" class="text-center text-muted py-3">Nenhum item adicionado ainda.</td>
                        </tr>
                        </tbody>
                        <tfoot class="table-light fw-bold">
                        <tr>
                            <td colspan="3" class="text-end">Total da Nota:</td>
                            <td th:text="${#numbers.formatCurrency(entrada.valorTotal)}" class="text-success fs-5"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="mt-4 border-top pt-3 text-end">
                    <a th:href="@{/listaEntrada}" class="btn btn-secondary px-4">
                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                    </a>
                    <button type="submit" name="acao" value="salvar" class="btn btn-success px-5 ms-2 shadow">
                        <i class="fa-solid fa-check-double me-1"></i> Finalizar Entrada
                    </button>
                </div>

                <input type="hidden" th:field="*{valorTotal}">
                <input type="hidden" th:field="*{quantidadeTotal}">
                <input type="hidden" th:name="dataEntrada" th:value="${#dates.format(entrada.dataEntrada, 'yyyy-MM-dd HH:mm:ss')}" th:if="${entrada.id != null}">
            </form>
        </div>
    </div>
</div>

</body>
</html>
