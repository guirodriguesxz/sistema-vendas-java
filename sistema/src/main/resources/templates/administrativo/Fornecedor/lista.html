<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Lista de Fornecedores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <style>
        .dataTables_filter { margin-bottom: 20px; }
        .page-item.active .page-link { background-color: #212529 !important; border-color: #212529 !important; color: white !important; }
        .page-link { color: #212529; }
        .table thead th { background-color: #f8f9fa; }
        .btn-action { transition: transform 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/administrativo}">
            <img src="https://img.icons8.com/parakeet-line/1200/total-sales-1.jpg" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Sistema de Vendas
        </a>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">
    <div class="card shadow-sm border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-dark mb-0">Fornecedores Cadastrados</h4>
            <a th:href="@{/cadastroFornecedor}" class="btn btn-primary shadow-sm">
                <i class="fas fa-plus me-1"></i> Novo Fornecedor
            </a>
        </div>

        <div class="table-responsive">
            <table id="tabelaFornecedores" class="table table-hover align-middle w-100">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Razão Social / Nome</th>
                    <th>CNPJ</th>
                    <th>Cidade</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="forn : ${listaFornecedores}">
                    <td th:text="${forn.id}" class="fw-bold">1</td>
                    <td th:text="${forn.nome}">Nome do Fornecedor</td>
                    <td th:text="${forn.cnpj}">00.000.000/0000-00</td>
                    <td th:text="${forn.cidade != null ? forn.cidade.nome : 'Não informada'}">Cidade</td>
                    <td class="text-center">
                        <a th:href="@{/editarFornecedor/{id}(id=${forn.id})}" class="text-primary me-3 btn-action d-inline-block" title="Editar">
                            <i class="fa-regular fa-pen-to-square fa-lg"></i>
                        </a>
                        <a th:href="@{/removerFornecedor/{id}(id=${forn.id})}" class="text-danger btn-action d-inline-block" title="Excluir"
                           onclick="return confirm('Deseja realmente remover este Fornecedor?')">
                            <i class="fa-solid fa-trash fa-lg"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 pt-3 border-top">
            <a th:href="@{/administrativo}" class="btn btn-outline-dark">
                <i class="fas fa-arrow-left me-1"></i> Voltar ao Menu
            </a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        $('#tabelaFornecedores').DataTable({
            "language": {
                "url": "https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
            },
            "pageLength": 10,
            "responsive": true
        });
    });
</script>

</body>
</html>
