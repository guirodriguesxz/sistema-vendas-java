<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<div class="container mt-5">
    <div class="card shadow-sm border-0 col-md-8 mx-auto">
        <div class="card-header bg-dark text-white"><h4>Cadastro de Cliente</h4></div>
        <div class="card-body">
            <form th:action="@{/salvarCliente}" th:object="${cliente}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">ID</label>
                    <input type="text" th:field="*{id}" class="form-control bg-light" readonly>
                </div>
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold">Nome do Cliente</label>
                        <input type="text" th:field="*{nome}" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">CPF</label>
                        <input type="text" th:field="*{cpf}" id="cpf" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Cidade</label>
                    <select th:field="*{cidade}" class="form-select" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option th:each="cid : ${listaCidades}" th:value="${cid.id}" th:text="${cid.nome}"></option>
                    </select>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary px-4">Salvar</button>
                    <a th:href="@{/listaCliente}" class="btn btn-secondary px-4 ms-2">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>$(document).ready(function(){ $('#cpf').mask('000.000.000-00'); });</script>
</body>
</html>
