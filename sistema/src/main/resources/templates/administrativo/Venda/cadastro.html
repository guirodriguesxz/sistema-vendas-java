<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">
    <div class="card shadow border-0">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fa-solid fa-cart-shopping me-2"></i>Efetuar Venda</h4>
            <span class="badge bg-white text-success fs-6" th:text="${#dates.format(venda.dataVenda, 'dd/MM/yyyy')}"></span>
        </div>
        <div class="card-body">
            <form th:action="@{/salvarVenda}" th:object="${venda}" method="POST">

                <input type="hidden" th:field="*{id}">

                <div class="row mb-4">
                    <div class="col-md-5">
                        <label class="form-label fw-bold">Cliente</label>
                        <select th:field="*{cliente}" class="form-select" required>
                            <option value="">Selecione o cliente...</option>
                            <option th:each="clie : ${listaClientes}" th:value="${clie.id}" th:text="${clie.nome}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Vendedor (Funcionário)</label>
                        <select th:field="*{funcionario}" class="form-select" required>
                            <option value="">Selecione o vendedor...</option>
                            <option th:each="func : ${listaFuncionarios}" th:value="${func.id}" th:text="${func.nome}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Observação</label>
                        <input type="text" th:field="*{obs}" class="form-control" placeholder="Ex: Venda à vista">
                    </div>
                </div>

                <hr>

                <div class="bg-white p-3 border rounded mb-4 shadow-sm" th:object="${itemVenda}">
                    <h5 class="mb-3 text-success border-bottom pb-2">Lançar Item</h5>
                    <div class="row align-items-end">
                        <div class="col-md-5">
                            <label class="form-label fw-bold small">Produto</label>
                            <select th:field="*{produto}" class="form-select">
                                <option value="">Selecione o produto...</option>
                                <option th:each="prod : ${listaProdutos}" th:value="${prod.id}" th:text="${prod.nome} + ' (Estoque: ' + ${prod.estoque} + ')'"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-bold small">Quantidade</label>
                            <input type="number" step="0.01" th:field="*{quantidade}" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-bold small">Preço Unitário (R$)</label>
                            <input type="number" step="0.01" th:field="*{valor}" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <button type="submit" name="acao" value="itens" class="btn btn-success w-100 fw-bold">
                                <i class="fa-solid fa-plus me-1"></i> Adicionar à Venda
                            </button>
                        </div>
                    </div>
                </div>

                <h5 class="mb-3"><i class="fa-solid fa-receipt me-2"></i>Itens do Carrinho</h5>
                <div class="table-responsive">
                    <table class="table table-hover border">
                        <thead class="table-light">
                        <tr>
                            <th>Produto</th>
                            <th class="text-center">Qtd</th>
                            <th>Vl. Unitário</th>
                            <th>Subtotal</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="it : ${listaItemVendas}">
                            <td th:text="${it.produto.nome}"></td>
                            <td th:text="${it.quantidade}" class="text-center"></td>
                            <td th:text="${#numbers.formatCurrency(it.valor)}"></td>
                            <td th:text="${#numbers.formatCurrency(it.quantidade * it.valor)}" class="fw-bold"></td>
                        </tr>
                        </tbody>
                        <tfoot class="table-light fs-5">
                        <tr>
                            <td colspan="3" class="text-end fw-bold">TOTAL DA VENDA:</td>
                            <td th:text="${#numbers.formatCurrency(venda.valorTotal)}" class="text-success fw-bold"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="mt-4 border-top pt-3 text-end">
                    <a th:href="@{/listaVenda}" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" name="acao" value="salvar" class="btn btn-primary px-5 ms-2 shadow fw-bold">
                        <i class="fa-solid fa-cash-register me-2"></i>Finalizar e Gravar
                    </button>
                </div>

                <input type="hidden" th:field="*{valorTotal}">
                <input type="hidden" th:field="*{quantidadeTotal}">
            </form>
        </div>
    </div>
</div>

</body>
</html>
