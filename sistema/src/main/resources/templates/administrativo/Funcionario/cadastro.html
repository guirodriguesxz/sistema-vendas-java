<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Cadastro de Funcionário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/administrativo}">
            <img src="https://img.icons8.com/parakeet-line/1200/total-sales-1.jpg" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Sistema de Vendas
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/administrativo}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/listaFuncionario}">Lista de Funcionários</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light">
                    <h4 class="mb-0 fw-bold text-dark">Cadastro de Funcionário</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/salvarFuncionario}" th:object="${funcionario}" method="POST">

                        <div class="row mb-3">
                            <div class="col-md-2">
                                <label for="id" class="form-label fw-bold">ID</label>
                                <input type="text" th:field="*{id}" class="form-control bg-light" id="id" readonly placeholder="Auto">
                            </div>
                            <div class="col-md-6">
                                <label for="nome" class="form-label fw-bold">Nome Completo</label>
                                <input type="text" th:field="*{nome}" class="form-control" id="nome" placeholder="Nome do funcionário" required>
                            </div>
                            <div class="col-md-4">
                                <label for="cpf" class="form-label fw-bold">CPF</label>
                                <input type="text" th:field="*{cpf}" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="email" class="form-label fw-bold">E-mail</label>
                                <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="exemplo@email.com" required>
                            </div>
                            <div class="col-md-4">
                                <label for="telefone" class="form-label fw-bold">Telefone</label>
                                <input type="text" th:field="*{telefone}" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                            </div>
                            <div class="col-md-4">
                                <label for="funcao" class="form-label fw-bold">Função / Cargo</label>
                                <input type="text" th:field="*{funcao}" class="form-control" id="funcao" placeholder="Ex: Vendedor" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="endereco" class="form-label fw-bold">Endereço (Rua/Av)</label>
                                <input type="text" th:field="*{endereco}" class="form-control" id="endereco" required>
                            </div>
                            <div class="col-md-2">
                                <label for="numero" class="form-label fw-bold">Número</label>
                                <input type="text" th:field="*{numero}" class="form-control" id="numero" required>
                            </div>
                            <div class="col-md-4">
                                <label for="bairro" class="form-label fw-bold">Bairro</label>
                                <input type="text" th:field="*{bairro}" class="form-control" id="bairro" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="cidade" class="form-label fw-bold">Cidade</label>
                            <select th:field="*{cidade}" class="form-select" id="cidade" required>
                                <option value="" disabled selected>Selecione uma cidade...</option>
                                <option th:each="cid : ${listaCidades}" th:value="${cid.id}" th:text="${cid.nome}"></option>
                            </select>
                        </div>

                        <div class="form-check mb-3">
                            <input type="checkbox" class="form-check-input" id="confirmar" required>
                            <label class="form-check-label" for="confirmar">Confirmo que os dados estão corretos</label>
                        </div>

                        <div class="mt-4 border-top pt-3 text-end">
                            <a th:href="@{/listaFuncionario}" class="btn btn-secondary px-4 me-2">Voltar</a>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">Salvar Funcionário</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<script>
    $(document).ready(function(){
      $('#cpf').mask('000.000.000-00');
      $('#telefone').mask('(00) 00000-0000');
    });
</script>

</body>
</html>
